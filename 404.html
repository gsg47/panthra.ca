<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | PANTHRA</title>
    <meta name="robots" content="noindex" />
    <meta name="description" content="The page you're looking for couldn't be found." />
    <meta name="theme-color" content="#050507" />

    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css?v=36" />
    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
        gap: 8px;
      }
      .error-code {
        font-size: clamp(90px, 22vw, 180px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -4px;
        background: var(--gradient-purple);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .error-title {
        font-size: clamp(24px, 5vw, 36px);
        font-weight: 700;
        margin-top: 16px;
      }
      .error-text {
        color: var(--text-secondary);
        max-width: 460px;
        margin: 12px auto 32px;
      }
      .error-actions {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="cursor-glow" id="cursorGlow"></div>

    <main class="error-page">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-text">The page you're looking for may have moved or no longer exists. Let's get you back to safety.</p>
      <div class="error-actions">
        <a href="index.html" class="btn-primary"><span>Back to Home</span></a>
        <a href="contact.html" class="btn-secondary"><span>Contact Us</span></a>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
